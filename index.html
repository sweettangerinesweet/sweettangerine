<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sweet Tangerine</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="navbar">
    <div class="container">

        <div class="logo">
            Sweet Tangerine
        </div>

        <nav>

            <a href="#">Home</a>
            <a href="#new">New Releases</a>
            <a href="#categories">Categories</a>

        </nav>

    </div>
</header>

<section class="hero">

    <div class="container">

        <h1>Find your next favorite read.</h1>

        <p>
            Discover thousands of books from every genre.
        </p>

        <input
            type="text"
            id="searchInput"
            placeholder="Search title or author..."
        >

    </div>

</section>


<section id="new" class="section">

    <div class="container">

        <h2>✨ New Releases</h2>

        <div
            id="newReleases"
            class="book-grid">
        </div>

    </div>

</section>


<section id="categories" class="section">

    <div class="container">

        <h2>Browse Categories</h2>

        <div id="categoryButtons">

        </div>

    </div>

</section>


<section class="section">

    <div class="container">

        <h2>Latest Books</h2>

        <div
            id="bookContainer"
            class="book-grid">

        </div>

    </div>

</section>

<section class="load-more">

    <button id="loadMoreBtn">

        Load More

    </button>

</section>


<footer>

    <div class="container">

        © 2026 Sweet Tangerine

    </div>

</footer>

<script src="js/api.js"></script>
<script src="js/script.js"></script>

</body>

</html>
