<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sweet Tangerine</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <!-- =========================
            HEADER
    ========================== -->

    <header>

        <div class="logo">

            🍊 Sweet Tangerine

        </div>

    </header>


    <!-- =========================
             HERO
    ========================== -->

    <section class="hero">

        <h1>

            Find your next favorite read.

        </h1>

        <p>

            Discover thousands of books from every genre.

        </p>

        <input
            id="searchInput"
            type="text"
            placeholder="Search title or author..."
        >

    </section>


    <!-- =========================
            BOOKS
    ========================== -->

<main>

    <!-- NEW RELEASES -->

    <section class="section">

        <div class="section-header">

            <h2>✨ New Releases</h2>

            <a href="#" id="viewAllNew">View All</a>

        </div>

        <div id="newReleaseGrid" class="book-grid">

        </div>

    </section>


    <!-- ALL BOOKS -->

    <section class="section">

        <div class="section-header">

            <h2>📚 Latest Books</h2>

        </div>

        <div id="bookGrid" class="book-grid">

        </div>

    </section>

</main>


    <!-- =========================
            FOOTER
    ========================== -->

    <footer>

        © 2026 Sweet Tangerine

    </footer>


    <script src="js/api.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
