<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sweet Tangerine</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <!-- =========================
            HEADER
    ========================== -->

    <header>

    <div class="header-container">

        <div class="logo">

            🍊 Sweet Tangerine

        </div>

        <nav>

            <a href="#">Home</a>

            <a href="#newReleaseGrid">New Releases</a>

            <a href="#bookGrid">Books</a>

        </nav>

    </div>

</header>


    <!-- =========================
             HERO
    ========================== -->

  <section class="hero">

    <span class="hero-badge">

        Discover your next favorite read

    </span>

    <h1>

        Find your next favorite read.

    </h1>

    <p>

        Explore more than 5,000 books from every genre.

    </p>

    <div class="search-area">

    <input
        id="searchInput"
        type="text"
        placeholder="Search books or authors..."
    >

    <select id="categorySelect">

        <option value="All">
            📚 All Genres
        </option>

    </select>

</div>

</section>


    <!-- =========================
            BOOKS
    ========================== -->

<main>

    <!-- NEW RELEASES -->

    <section class="section">

        <div class="section-header">

            <h2>✨ New Releases</h2>

            <a href="#" id="viewAllNew">View All</a>

        </div>

        <div id="newReleaseGrid" class="book-grid">

        </div>

    </section>


    <!-- ALL BOOKS -->

    <section class="section">

        <div class="section-header">

            <h2>📚 Latest Books</h2>

        </div>

        <div id="bookGrid" class="book-grid">

        </div>

    </section>

</main>


    <!-- =========================
            FOOTER
    ========================== -->

    <footer>

        © 2026 Sweet Tangerine

    </footer>


    <script src="js/api.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
